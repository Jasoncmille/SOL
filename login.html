<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Solutions Faith Ministry</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { 
            background: #f4f4f4; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }
        .btn-green { 
            background: #17690d; 
            color: white; 
            font-weight: bold;
        }
        .btn-green:hover { 
            background: #0e4a07; 
            color: white; 
        }
        .brand-text {
            color: #17690d;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h4 class="brand-text">Solutions Faith Ministry</h4>
            <p class="text-muted">Admin Dashboard</p>
        </div>
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter admin password" required autofocus>
            </div>
            <button type="submit" class="btn btn-green btn-block">Login</button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-muted"><small>&larr; Back to Website</small></a>
        </div>
    </div>
</body>
</html>
